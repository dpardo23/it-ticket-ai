name: "Publicar Versión Nativa (Release)"

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Instalar Rust estable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Instalar dependencias de desarrollo de Linux
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Instalar dependencias del Frontend
        run: |
          cd ui
          pnpm install

      - name: Compilar Frontend (Next.js) y exportar a out
        run: |
          cd ui
          pnpm build
          # Intentar exportar a out para que Tauri empaquete los assets estáticos.
          # Si package.json tiene script "export", se usará; si no, intentamos next export.
          if pnpm -s run export; then
            echo "Export completado con pnpm export"
          else
            pnpm exec -- next export -o out || true
          fi

      - name: Compilar y empaquetar con Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          projectPath: './ui'
          tagName: ${{ github.ref_name }}
          releaseName: 'IT Ticket AI v__VERSION__'
          releaseBody: 'Lanzamiento oficial automatizado.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
