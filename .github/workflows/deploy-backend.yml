name: "Desplegar Backend a Hugging Face"

on:
  push:
    branches:
      - main
    paths:
      - 'ai_engine/**'

jobs:
  deploy-to-huggingface:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Empujar carpeta ai_engine a Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd ai_engine
          
          # 1. Crear el README especial que exige Hugging Face
          cat > README.md << 'EOF'
          ---
          title: IT Ticket AI Backend
          emoji: 🧠
          colorFrom: blue
          colorTo: red
          sdk: docker
          pinned: false
          ---
          Backend de Inteligencia Artificial MLOps para IT Ticket AI.
          EOF
          
          # 2. Inicializar Git y subir SOLO la carpeta ai_engine
          git init
          git checkout -b main
          git config user.email "bot@bytebusters.com"
          git config user.name "HF Sync Bot"
          git add .
          git commit -m "Deploy automático: Inyección de README y actualización de código"
          git push -f https://dpardo:$HF_TOKEN@huggingface.co/spaces/dpardo/it-ticket-ai-backend main